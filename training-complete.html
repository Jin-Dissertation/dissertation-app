<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Training activity complete</title>
  <style>
    :root {
      --bg: #edf4ff;
      --card: #ffffff;
      --text: #10213d;
      --muted: #5f718f;
      --border: #c8d8f0;
      --success: #15803d;
      --success-soft: #dcfce7;
    }

    * { box-sizing: border-box; }

    body.training-complete-page {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .training-complete-wrap {
      width: min(100%, 680px);
    }

    .training-complete-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 36px rgba(16, 33, 61, 0.1);
      padding: clamp(28px, 5vw, 44px);
      text-align: center;
    }

    .training-complete-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--success-soft);
      color: var(--success);
      font-size: 26px;
      line-height: 1;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.45rem, 3.6vw, 1.9rem);
      line-height: 1.2;
    }

    p {
      margin: 0;
      font-size: 1.03rem;
      line-height: 1.6;
      color: var(--text);
    }

    p + p {
      margin-top: 8px;
    }

    .training-complete-subtext {
      margin-top: 16px;
      font-size: 0.92rem;
      color: var(--muted);
    }
  </style>
</head>
<body class="training-complete-page">
  <main class="training-complete-wrap">
    <section class="training-complete-card" aria-live="polite">
      <div class="training-complete-icon" aria-hidden="true">✓</div>
      <h1>Training complete — thank you!</h1>
      <p>Your session has been submitted. You can now close this window and return to the training.</p>      
    </section>
  </main>
</body>
</html>
